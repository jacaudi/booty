name: Build Image

# Builds and publishes the booty container image to GHCR.
#
# A lean, reliable alternative to the heavyweight docker-publish.yml (which is
# disabled — its SLSA-provenance/cosign chain can't run in PR context and is
# overkill for dev/test images). This one just builds the multi-arch image and
# pushes it, so an image is always pullable.
#
# Triggers:
#   - push to main      -> ghcr.io/<owner>/booty:main + :latest + :sha-<short>
#   - tag v*.*.*        -> ghcr.io/<owner>/booty:<semver>
#   - manual dispatch   -> optional extra tag via the `tag` input
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to publish (optional, e.g. pr6-test)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BOOTY_VERSION=${{ github.ref_name }}
            BOOTY_TIMESTAMP=${{ github.event.repository.updated_at }}
